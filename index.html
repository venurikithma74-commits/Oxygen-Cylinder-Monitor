<!DOCTYPE html>
<html>
<head>
  <title>Oxygen Cylinder Monitor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #1a1a1a;
      color: white;
      padding-top: 50px;
    }
    h1 { font-size: 28px; }
    #status {
      font-size: 42px;
      font-weight: bold;
      padding: 30px;
      border-radius: 16px;
      display: inline-block;
      margin-top: 20px;
      min-width: 300px;
    }
    .normal { background: #1a7d1a; color: #c8f7c5; }
    .low { background: #a11a1a; color: #f7c5c5; }
    #time { margin-top: 15px; color: #999; }
  </style>
</head>
<body>
  <h1>🫁 Oxygen Cylinder Level Monitor</h1>
  <div id="status">Loading...</div>
  <p id="time"></p>

  <script>
    const SUPABASE_URL = "https://snpftwdqduxefnjqkgxn.supabase.co";
    const SUPABASE_KEY = "sb_publishable_dCH1kFuZAmz_MB-9U5sidw_EWpH2xUh";

    async function fetchLatest() {
      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/oxygen_readings?order=created_at.desc&limit=1`,
          { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
        );
        const data = await res.json();
        if (data.length > 0) {
          const reading = data[0];
          const div = document.getElementById("status");
          div.className = reading.status === "low" ? "low" : "normal";
          div.textContent = `Level: ${reading.level} (${reading.status.toUpperCase()})`;
          document.getElementById("time").textContent =
            "Last updated: " + new Date(reading.created_at).toLocaleTimeString();
        }
      } catch (err) {
        document.getElementById("status").textContent = "Connection error";
      }
    }

    fetchLatest();
    setInterval(fetchLatest, 5000);
  </script>
</body>
</html>
