<!DOCTYPE html>
<html>
<head>
  <title>Oxygen Cylinder Monitor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #1a1a1a;
      color: white;
      padding-top: 40px;
    }
    h1 { font-size: 26px; margin-bottom: 5px; }
    h2 { font-size: 18px; margin-top: 50px; color: #ccc; }
    #grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }
    .card {
      padding: 25px;
      border-radius: 16px;
      min-width: 220px;
    }
    .cylinder-name { font-size: 16px; margin-bottom: 8px; opacity: 0.8; }
    .level { font-size: 30px; font-weight: bold; }
    .normal { background: #1a7d1a; color: #c8f7c5; }
    .low { background: #a11a1a; color: #f7c5c5; }
    .time { font-size: 12px; margin-top: 8px; color: #ccc; }

    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 90%;
      max-width: 700px;
    }
    th, td {
      padding: 8px 12px;
      border-bottom: 1px solid #333;
      font-size: 14px;
    }
    th { color: #999; }
    .status-low { color: #ff7b7b; font-weight: bold; }
    .status-normal { color: #7bff8f; }
  </style>
</head>
<body>
  <h1>🫁 Oxygen Cylinder Level Monitor</h1>
  <div id="grid">Loading...</div>

  <h2>Recent Updates</h2>
  <table id="updatesTable">
    <thead>
      <tr><th>Cylinder</th><th>Level</th><th>Status</th><th>Time</th></tr>
    </thead>
    <tbody id="updatesBody"></tbody>
  </table>

  <script>
    const SUPABASE_URL = "https://snpftwdqduxefnjqkgxn.supabase.co";
    const SUPABASE_KEY = "PASTE_YOUR_PUBLISHABLE_KEY_HERE";

    // Ask permission for browser notifications
    if ("Notification" in window && Notification.permission !== "granted") {
      Notification.requestPermission();
    }

    // Track which cylinders were already low, so we don't spam notifications every 5s
    const alreadyNotifiedLow = new Set();

    async function fetchLatest() {
      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/oxygen_readings?order=created_at.desc&limit=50`,
          { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
        );
        const data = await res.json();

        // ---- Cards: latest reading per cylinder ----
        const latestByCylinder = {};
        for (const row of data) {
          const id = row.cylinder_id || "Cylinder-1";
          if (!latestByCylinder[id]) latestByCylinder[id] = row;
        }

        const grid = document.getElementById("grid");
        grid.innerHTML = "";
        Object.entries(latestByCylinder).forEach(([id, reading]) => {
          const isLow = reading.status === "low";
          const card = document.createElement("div");
          card.className = "card " + (isLow ? "low" : "normal");
          card.innerHTML = `
            <div class="cylinder-name">${id}</div>
            <div class="level">${reading.level} (${reading.status.toUpperCase()})</div>
            <div class="time">Updated: ${new Date(reading.created_at).toLocaleTimeString()}</div>
          `;
          grid.appendChild(card);

          // ---- Notification logic ----
          if (isLow && !alreadyNotifiedLow.has(id)) {
            alreadyNotifiedLow.add(id);
            if ("Notification" in window && Notification.permission === "granted") {
              new Notification("⚠️ Low Oxygen Warning", {
                body: `${id} has dropped to a low level (${reading.level})!`
              });
            }
          } else if (!isLow && alreadyNotifiedLow.has(id)) {
            alreadyNotifiedLow.delete(id); // reset so it can alert again next time it goes low
          }
        });

        // ---- Recent updates table: last 10 readings overall ----
        const tbody = document.getElementById("updatesBody");
        tbody.innerHTML = "";
        data.slice(0, 10).forEach(row => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${row.cylinder_id || "Cylinder-1"}</td>
            <td>${row.level}</td>
            <td class="status-${row.status}">${row.status.toUpperCase()}</td>
            <td>${new Date(row.created_at).toLocaleTimeString()}</td>
          `;
          tbody.appendChild(tr);
        });

      } catch (err) {
        document.getElementById("grid").textContent = "Connection error";
      }
    }

    fetchLatest();
    setInterval(fetchLatest, 5000);
  </script>
</body>
</html>
